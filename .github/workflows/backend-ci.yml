name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
        # Nota: o cache só funciona depois que backend/package-lock.json
        # existir e estiver commitado. Antes disso, essa etapa não falha
        # o build, apenas não cacheia nada.

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npm run typecheck --if-present

      - name: Build
        run: npm run build --if-present

      - name: Run tests
        run: npm test --if-present

  # ---------------------------------------------------------------
  # Quando a stack do client for decidida, adicione um job separado
  # aqui (ou um workflow client-ci.yml próprio), com path filter
  # equivalente para 'client/**'. Mantenha os jobs independentes
  # para que um push só no client não dispare o build do backend
  # e vice-versa.
  # ---------------------------------------------------------------
