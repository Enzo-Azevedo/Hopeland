name: Delete merged branch

# Deleta a branch de origem quando um PR é mergeado na main.
# Não cobre merges feitos sem PR (push direto de merge commit) —
# nesses casos o GitHub não expõe qual branch foi mergeada.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  delete-branch:
    # Só roda se o PR foi de fato mergeado (não apenas fechado)
    # e se a branch vive neste repo (não deletamos branch de fork).
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Delete head branch
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/$HEAD_REF"
